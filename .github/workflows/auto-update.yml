name: Daily Auto Commit

on:
  schedule:
    # Runs daily at morning IST (12:45 AM UTC / 6:15 AM IST)
    - cron: '45 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make commits
        run: |
          FILES=("TODO.md" "BUGS.md" "testing-notes.txt" "future-updates.md" "dev-notes.md")
          
          # Randomize cycle count between 3 and 5 (6 to 10 commits)
          MIN_CYCLES=3
          MAX_CYCLES=5
          CYCLES=$((MIN_CYCLES + RANDOM % (MAX_CYCLES - MIN_CYCLES + 1)))
          echo "Selected random cycle count: $CYCLES"
          
          for i in $(seq 1 $CYCLES)
          do
            # Randomly select commit author for this cycle to look like active collaboration
            AUTHORS=("Sriram Gandhi S|iamramm8@gmail.com" "Rizz Architect|srirams23cs@psnacet.edu.in")
            SELECTED_AUTHOR=${AUTHORS[$RANDOM % 2]}
            IFS="|" read -r AUTHOR_NAME AUTHOR_EMAIL <<< "$SELECTED_AUTHOR"
            git config --global user.name "$AUTHOR_NAME"
            git config --global user.email "$AUTHOR_EMAIL"

            # Pick a random developer note file to modify
            SELECTED_FILE=${FILES[$RANDOM % ${#FILES[@]}]}
            echo "Starting cycle $i on file: $SELECTED_FILE by $AUTHOR_NAME"
            
            # Define project-specific natural commit messages based on file type
            case "$SELECTED_FILE" in
              "TODO.md")
                ADD_MSGS=(
                  "docs: add speech-to-text API integration steps to todo"
                  "docs: update ATS resume parsing scoring tasks"
                  "docs: add AI mock interview evaluation items to checklist"
                )
                DEL_MSGS=(
                  "docs: clean up completed tasks in todo log"
                  "docs: remove resolved checklist items in todo"
                  "docs: organize task priorities in todo list"
                )
                ;;
              "BUGS.md")
                ADD_MSGS=(
                  "docs: document audio recording permission issues in bugs tracker"
                  "docs: track JSON parsing mismatch on groq api responses"
                  "docs: add state management race condition issue to log"
                )
                DEL_MSGS=(
                  "docs: remove resolved bugs from track log"
                  "docs: clean up closed bug comments"
                  "docs: normalize formatting of bug tracking file"
                )
                ;;
              "future-updates.md")
                ADD_MSGS=(
                  "docs: design roadmap for websocket real-time audio feed"
                  "docs: add multi-language support draft to future updates"
                  "docs: outline AI voice feedback module plans"
                )
                DEL_MSGS=(
                  "docs: clean up future updates roadmap formatting"
                  "docs: refine project updates outline"
                  "docs: format future updates items"
                )
                ;;
              "testing-notes.txt")
                ADD_MSGS=(
                  "test: record API latency test results on groq endpoints"
                  "test: log local transcription test checks"
                  "test: document frontend hooks and context testing logs"
                )
                DEL_MSGS=(
                  "test: prune outdated test reports in notes"
                  "test: clean up testing notes document"
                  "test: format testing notes"
                )
                ;;
              "dev-notes.md")
                ADD_MSGS=(
                  "docs: update API request/response schema specifications"
                  "docs: document local node dev script dependencies"
                  "docs: write setup instructions for mock db configuration"
                )
                DEL_MSGS=(
                  "docs: clean up dev environment instructions"
                  "docs: remove old package script details"
                  "docs: normalize dev notes styling"
                )
                ;;
            esac
            
            # Step 1: ADD
            echo " " >> $SELECTED_FILE
            msg_add=${ADD_MSGS[$RANDOM % ${#ADD_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_add"
            git pull origin ${{ github.ref_name }} --rebase
            git push origin HEAD:${{ github.ref_name }}
            
            # Sleep between ADD and DEL (random 20 to 45 minutes)
            sleep $((1200 + RANDOM % 1500))
            
            # Step 2: DEL
            sed -i '$d' $SELECTED_FILE
            msg_del=${DEL_MSGS[$RANDOM % ${#DEL_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_del"
            git pull origin ${{ github.ref_name }} --rebase
            git push origin HEAD:${{ github.ref_name }}
            
            # Sleep between cycles (random 30 to 60 minutes)
            sleep $((1800 + RANDOM % 1800))
          done
